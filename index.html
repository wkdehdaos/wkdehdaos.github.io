<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>내 위치 날씨 음식 추천</title>
    <link rel="stylesheet" href="style.css?v=3">
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>내 위치 날씨 음식 추천</h1>
            <div class="header-actions">
                <button class="header-btn" type="button" id="contact-toggle" aria-label="제휴문의">
                    <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    <span class="header-btn-label">제휴문의</span>
                </button>
                <button class="header-btn" type="button" id="comments-toggle" aria-label="댓글">
                    <svg aria-hidden="true" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                    <span class="header-btn-label">댓글</span>
                </button>
                <button class="theme-toggle" type="button" aria-pressed="false" aria-label="다크 모드로 전환">
                    <span class="theme-icon" aria-hidden="true">🌙</span>
                    <span class="theme-label">다크 모드</span>
                </button>
            </div>
        </div>
    </header>

    <main>
        <!-- 위치 감지 전 -->
        <section class="locate-section" id="locate-section">
            <div class="locate-card">
                <div class="locate-icon">📍</div>
                <h2>지금 내 위치의 날씨로<br>음식을 추천해드려요</h2>
                <p>현재 위치·날씨·주변 음식점 정보를 분석해<br>딱 맞는 메뉴 2가지를 추천합니다.</p>
                <button class="locate-btn" id="locate-btn" type="button">현재 위치로 추천받기</button>
            </div>
        </section>

        <!-- 로딩 / 결과 -->
        <section class="result-section" id="result-section" hidden>
            <!-- 위치·날씨 정보 -->
            <div class="info-bar" id="info-bar">
                <div class="info-item" id="info-location">
                    <span class="info-label">위치</span>
                    <span class="info-value" id="location-name">—</span>
                </div>
                <div class="info-item" id="info-weather">
                    <span class="info-label">날씨</span>
                    <span class="info-value" id="weather-text">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">날짜</span>
                    <span class="info-value" id="date-text">—</span>
                </div>
                <button class="retry-btn" id="retry-btn" type="button">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                    다시 찾기
                </button>
            </div>

            <!-- 추천 결과 -->
            <div class="recommendation-area">
                <h2 class="rec-title">추천 메뉴 <span class="rec-count">2가지</span></h2>
                <div id="food-recommendation" class="food-grid-2"></div>
            </div>
        </section>
    </main>

    <!-- 제휴문의 모달 -->
    <div class="modal-overlay" id="contact-modal" role="dialog" aria-modal="true" aria-labelledby="contact-modal-title">
        <div class="modal">
            <div class="modal-header">
                <h2 id="contact-modal-title">제휴문의 · 광고문의</h2>
                <button class="modal-close" type="button" aria-label="닫기">✕</button>
            </div>
            <div class="modal-body">
                <p class="modal-desc">서비스 제휴, 광고 집행, 콘텐츠 협업 문의를 남겨주세요.</p>
                <form class="contact-form" action="https://formspree.io/f/xykqgolk" method="POST">
                    <div class="form-row">
                        <label for="contact-name">이름</label>
                        <input id="contact-name" name="name" type="text" autocomplete="name" required>
                    </div>
                    <div class="form-row">
                        <label for="contact-email">이메일</label>
                        <input id="contact-email" name="email" type="email" autocomplete="email" required>
                    </div>
                    <div class="form-row">
                        <label for="contact-type">문의 유형</label>
                        <select id="contact-type" name="inquiry_type" required>
                            <option value="제휴문의">제휴문의</option>
                            <option value="광고문의">광고문의</option>
                            <option value="기타문의">기타문의</option>
                        </select>
                    </div>
                    <div class="form-row form-row-full">
                        <label for="contact-message">문의 내용</label>
                        <textarea id="contact-message" name="message" rows="5" required></textarea>
                    </div>
                    <input type="hidden" name="_subject" value="내 위치 날씨 음식 추천 문의">
                    <button class="submit-btn" type="submit">문의 보내기</button>
                </form>
            </div>
        </div>
    </div>

    <!-- 댓글 모달 -->
    <div class="modal-overlay" id="comments-modal" role="dialog" aria-modal="true" aria-labelledby="comments-modal-title">
        <div class="modal modal-wide">
            <div class="modal-header">
                <h2 id="comments-modal-title">댓글</h2>
                <button class="modal-close" type="button" aria-label="닫기">✕</button>
            </div>
            <div class="modal-body">
                <div id="disqus_thread"></div>
                <noscript>댓글을 보려면 JavaScript를 활성화해 주세요. <a href="https://disqus.com/?ref_noscript">Disqus 댓글 서비스</a></noscript>
            </div>
        </div>
    </div>

    <script src="main.js?v=3"></script>
</body>
</html>
